<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SMM Panel — Cheapest Instagram & YouTube</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg,  #FFA500, #1a1a2e, #FFA500);
      color: #fff;
      min-height: 100vh;
      margin: 0;
    }
    h1 {
      text-align: center;
      padding: 30px 10px 10px;
      font-size: 2.8rem;
      background: linear-gradient(90deg, #a5b4fc, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }
    .tagline { text-align: center; color: #94a3b8; margin-bottom: 30px; }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 15px; }

    .platform-box {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 25px;
      margin: 25px 0;
      transition: all 0.4s ease;
    }
    .platform-box:hover {
      transform: translateY(-10px);
      border-color: #67e8f9;
      box-shadow: 0 20px 40px rgba(103, 232, 249, 0.15);
    }

    .platform-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.7rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .platform-title img { width: 38px; height: 38px; }

    .service {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.08);
      padding: 16px 20px;
      border-radius: 16px;
      margin: 12px 0;
      transition: all 0.3s;
    }
    .service:hover {
      background: rgba(103, 232, 249, 0.15);
      transform: scale(1.02);
    }
    .price { font-size: 1.35rem; font-weight: 700; color: #67e8f9; }

    button {
      background: linear-gradient(135deg, #6366f1, #22d3ee);
      border: none;
      padding: 10px 24px;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { transform: scale(1.08); }

    .big-btn {
      background: linear-gradient(135deg, #22c55e, #86efac);
      padding: 14px 32px;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: none; justify-content: center; align-items: center; z-index: 1000;
    }
    .modal-content {
      background: #1e2937;
      border-radius: 20px;
      padding: 30px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      border: 1px solid #67e8f9;
    }

    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #22c55e; color: white; padding: 14px 28px;
      border-radius: 50px; font-weight: 600; display: none; z-index: 2000;
    }
  </style>
</head>
<body>
  <h1>CHEAP SMM PANEL</h1>
  <p class="tagline">Super Cheap • Instant Delivery • Real Results</p>

  <div class="container" id="services"></div>

  <!-- Verify Modal -->
  <div class="modal" id="verifyModal">
    <div class="modal-content">
      <h2 id="verifyTitle">Verify</h2>
      <p id="verifyLabel" style="margin:15px 0 8px; font-size:1.1rem;"></p>
      <input type="text" id="verifyInput" style="width:100%; padding:14px; border-radius:12px; background:#0f172a; border:1px solid #64748b; color:white; font-size:1rem;" placeholder="">
      <button onclick="verifyUser()" style="margin-top:20px; width:100%; padding:14px;">Verify & Continue →</button>
      <button onclick="closeModal('verifyModal')" style="margin-top:10px; background:#475569; width:100%; padding:12px;">Cancel</button>
    </div>
  </div>

  <!-- QR Modal -->
  <div class="modal" id="qrModal">
    <div class="modal-content" style="max-width:440px;">
      <h2>Scan to Pay via UPI</h2>
      <div id="amountDisplay" style="font-size:1.8rem; font-weight:bold; margin:15px 0; color:#67e8f9;"></div>
      
      <div class="qr-code" style="margin:15px 0; background:white; padding:15px; border-radius:16px; display:inline-block;">
        <canvas id="qrcode" style="width:260px; height:260px;"></canvas>
      </div>

      <div id="countdown" style="font-size:1.3rem; font-weight:bold; color:#f87171; margin:12px 0;"></div>

      <div style="margin:20px 0;">
        <label style="display:block; margin-bottom:8px;">Enter UTR / Transaction ID</label>
        <input type="text" id="utrInput" placeholder="Enter full UTR" style="width:100%; padding:14px; border-radius:12px; background:#0f172a; border:1px solid #64748b; color:white;">
      </div>

      <button class="big-btn" onclick="verifyUTR()" style="width:100%; margin:10px 0;">✅ I Have Paid - Verify Payment</button>
      <button id="reloadQRBtn" style="display:none; width:100%; padding:12px; background:#3b82f6;">🔄 Reload QR Code</button>
      
      <button onclick="closeModal('qrModal')" style="margin-top:15px; background:#475569; width:100%; padding:12px;">Cancel</button>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="modal" id="paymentSuccessModal">
    <div class="modal-content">
      <h2>Payment not recived!</h2>
      <p id="successService" style="margin:15px 0; font-size:1.1rem;"></p>
      <p id="successUserInput" style="margin:10px 0;"></p>
      <p>Please enter correct utr<br>Please check the payment utr.</p>
      <button class="big-btn" onclick="closeModal('paymentSuccessModal')" style="width:100%; margin-top:20px;">OK</button>
    </div>
  </div>

  <div class="toast" id="toast">Success</div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script>
    const UPI_ID = 'bestsmm1231@nyes';
    const MERCHANT_NAME = 'Social Media Booster';

    let currentService = null;
    let timerInterval;

    const SERVICES = [
      {platform:'Instagram', icon:'https://cdn-icons-png.flaticon.com/512/174/174855.png', items:[
        {name:'2500 Instagram Followers', price:15, verifyField:{label:'Enter Instagram Username', placeholder:'@username'}},
        {name:'10,000 Instagram Followers', price:59, verifyField:{label:'Enter Instagram Username', placeholder:'@username'}},
        {name:'Instagram Permanent Blue Tick', price:99, verifyField:{label:'Enter Instagram Username', placeholder:'@username'}},
        {name:'50,000 Reel Views', price:35, verifyField:{label:'Enter Reel Link', placeholder:'Paste link'}},
        {name:'10,000 Likes', price:55, verifyField:{label:'Enter Post/Reel Link', placeholder:'Paste link'}}
      ]},
      {platform:'YouTube', icon:'https://cdn-icons-png.flaticon.com/512/1384/1384060.png', items:[
        {name:'2,000 YouTube Subscribers', price:89, verifyField:{label:'Enter Channel URL', placeholder:'Paste channel link'}},
        {name:'10,000 YouTube Subscribers', price:399, verifyField:{label:'Enter Channel URL', placeholder:'Paste channel link'}},
        {name:'100,000 Video Views', price:129, verifyField:{label:'Enter Video URL', placeholder:'Paste link'}},
        {name:'500,000 Shorts Views', price:199, verifyField:{label:'Enter Shorts Link', placeholder:'Paste link'}}
      ]},
      {platform:'Facebook', icon:'https://cdn-icons-png.flaticon.com/512/733/733547.png', items:[
        {name:'5,000 Facebook Followers', price:25, verifyField:{label:'Enter Profile/Page Link', placeholder:'Paste link'}},
        {name:'20,000 Reels Views', price:35, verifyField:{label:'Enter Reel Link', placeholder:'Paste link'}}
      ]}
    ];

    function renderServices(){
      const container = document.getElementById('services');
      container.innerHTML = '';
      SERVICES.forEach(group => {
        const box = document.createElement('div');
        box.className = 'platform-box';
        box.innerHTML = `<div class='platform-title'><img src="${group.icon}"/> ${group.platform}</div>`;
        
        group.items.forEach(s => {
          const row = document.createElement('div');
          row.className = 'service';
          row.innerHTML = `
            <span>${s.name}</span>
            <div style="text-align:right">
              <span class="price">₹${s.price}</span><br>
              <button onclick='openVerify(${JSON.stringify(s)})'>Buy Now</button>
            </div>`;
          box.appendChild(row);
        });
        container.appendChild(box);
      });
    }

    function openVerify(service){
      currentService = service;
      document.getElementById('verifyTitle').innerText = service.name;
      document.getElementById('verifyLabel').innerText = service.verifyField.label;
      document.getElementById('verifyInput').placeholder = service.verifyField.placeholder;
      document.getElementById('verifyInput').value = '';
      document.getElementById('verifyModal').style.display = 'flex';
    }

    function closeModal(id){
      document.getElementById(id).style.display = 'none';
    }

    function showToast(msg){
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2500);
    }

    function verifyUser(){
      if(!document.getElementById('verifyInput').value.trim()){
        alert("Please enter the required details");
        return;
      }
      closeModal('verifyModal');
      showToast('✅ Verified Successfully');
      setTimeout(openQR, 600);
    }

    function openQR(){
      const amount = currentService.price;
      document.getElementById('amountDisplay').innerText = `₹${amount} to Pay`;

      const upiUrl = `upi://pay?pa=${UPI_ID}&pn=${MERCHANT_NAME}&am=${amount}&cu=INR`;

      const canvas = document.getElementById('qrcode');
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

      QRCode.toCanvas(canvas, upiUrl, { width: 260, margin: 1 }, err => {
        if (err) console.error(err);
      });

      document.getElementById('qrExpiredMsg') && (document.getElementById('qrExpiredMsg').style.display = 'none');
      document.getElementById('reloadQRBtn').style.display = 'none';
      document.getElementById('qrcode').style.display = 'block';
      document.getElementById('utrInput').value = '';

      document.getElementById('qrModal').style.display = 'flex';
      startCountdown(10 * 60); // 10 minutes
    }

    function startCountdown(seconds){
      clearInterval(timerInterval);
      let timeLeft = seconds;
      const el = document.getElementById('countdown');

      el.innerText = formatTime(timeLeft);

      timerInterval = setInterval(() => {
        timeLeft--;
        el.innerText = formatTime(timeLeft);
        if(timeLeft <= 0){
          clearInterval(timerInterval);
          document.getElementById('qrcode').style.display = 'none';
          document.getElementById('reloadQRBtn').style.display = 'block';
        }
      }, 1000);
    }

    function formatTime(sec){
      let m = Math.floor(sec/60);
      let s = sec % 60;
      return `Time Left: ${m}:${s < 10 ? '0' : ''}${s}`;
    }

    document.getElementById('reloadQRBtn').onclick = () => openQR();

    function verifyUTR(){
      const utr = document.getElementById('utrInput').value.trim();
      if(!utr){
        alert("Please enter UTR / Transaction ID");
        return;
      }
      closeModal('qrModal');
      document.getElementById('successService').innerText = `Service: ${currentService.name}`;
      document.getElementById('successUserInput').innerText = `Account: ${document.getElementById('verifyInput').value || 'Not Provided'}`;
      document.getElementById('paymentSuccessModal').style.display = 'flex';
    }

    // Start the website
    renderServices();
  </script>
</body>
</html>
